name: Bug Report
description: Something isn't working correctly
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: Thanks for taking the time to report a bug!

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Open the app
        2. Add a Poll widget
        3. ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What should have happened instead?
    validations:
      required: true

  - type: dropdown
    id: deployment
    attributes:
      label: How are you running OpenClassBoard?
      options:
        - openclassboard.com (hosted)
        - Docker (self-hosted)
        - npm run dev (local)
    validations:
      required: true

  - type: input
    id: browser
    attributes:
      label: Browser & OS
      placeholder: e.g. Chrome 123 on Windows 11

  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots or console errors
      description: Paste any relevant errors from the browser console here.
