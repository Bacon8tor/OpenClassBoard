name: Feature Request
description: Suggest a new widget, improvement, or idea
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: Got an idea that would make OpenClassBoard better for teachers? Share it!

  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: Describe the teaching scenario or pain point this addresses.
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Describe the solution you'd like
      description: What would you like to see added or changed?
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any other approaches you've thought about?

  - type: dropdown
    id: type
    attributes:
      label: Type of request
      options:
        - New widget
        - Improvement to existing widget
        - UI / UX improvement
        - Performance
        - Docker / deployment
        - Other
